<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminous Memories - Christmas Tree</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #020202; /* 极深黑背景 */
            font-family: 'Cinzel', serif;
            user-select: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 摄像头反馈 (调试) */
        #video-input {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 160px;
            height: 120px;
            transform: scaleX(-1);
            border-radius: 10px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            z-index: 10;
            opacity: 0.5;
            object-fit: cover;
            transition: opacity 0.3s;
        }
        #video-input:hover { opacity: 1; }

        /* UI */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            color: #FFD700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
        }

        h1 {
            margin: 0;
            font-size: 3rem;
            letter-spacing: 5px;
            font-weight: 700;
        }

        .status {
            font-size: 1.2rem;
            color: #fff;
            margin-top: 10px;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            font-weight: bold;
        }

        .controls {
            pointer-events: auto;
            text-align: center;
        }

        .btn {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid #FFD700;
            color: #FFD700;
            padding: 12px 35px;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 30px;
            margin: 10px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: #FFD700;
            color: #000;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
        }

        #file-input { display: none; }

        /* 加载 */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #FFD700;
            flex-direction: column;
            transition: opacity 1s;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid transparent;
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .guide-box {
            position: absolute;
            top: 50%;
            right: 40px;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.8);
            text-align: right;
            font-size: 1rem;
            line-height: 2.2;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
        }
        .guide-icon { color: #FFD700; font-weight: bold; margin-right: 8px; font-size: 1.2rem; }
    </style>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loading-text">Illuminating Memories...</div>
    </div>

    <video id="video-input"></video>

    <div id="ui-layer">
        <div class="header">
            <h1>NOËL LUMINOUS</h1>
            <div class="status" id="status-text">Waiting for Hand Detection...</div>
        </div>
        
        <div class="guide-box">
            <div><span class="guide-icon">✊</span> 握拳 - 聚合 (Tree)</div>
            <div><span class="guide-icon">🖐</span> 张开 - 散开 (Scatter)</div>
            <div><span class="guide-icon">👋</span> 挥手 - 旋转 (Rotate)</div>
            <div><span class="guide-icon">👌</span> 捏合 - 抓取回忆 (Focus)</div>
        </div>

        <div class="controls">
            <input type="file" id="file-input" multiple accept="image/*">
            <button class="btn" onclick="document.getElementById('file-input').click()">+ Upload Photos</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        const CONFIG = {
            colors: {
                green: 0x2F4F4F,
                gold: 0xFFD700,
                red: 0xFF0000,
            },
            particleCount: 450, 
            treeHeight: 65,
            baseRadius: 28,
            spreadRadius: 85,
            camSmooth: 0.05
        };

        const STATE = {
            CLOSED: 0,
            OPEN: 1,
            ZOOM: 2
        };

        let currentState = STATE.CLOSED;
        let targetRotation = { x: 0, y: 0 };
        let currentRotation = { x: 0, y: 0 };
        let photoTextures = [];
        
        let scene, camera, renderer, composer;
        let objects = [];
        let focusedPhoto = null;

        function initThree() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            // 雾气稍微调低一点，让黑色背景更深邃
            scene.fog = new THREE.FogExp2(0x020202, 0.012);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 100);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            // 保持 ACESFilmic，这对于高亮光球效果最好
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.1; // 稍微降低一点点曝光，防止照片过曝
            // 关键：启用输出编码转换
            renderer.outputEncoding = THREE.sRGBEncoding;
            
            container.appendChild(renderer.domElement);

            // --- 灯光系统 ---
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(CONFIG.colors.gold, 2.5, 300);
            pointLight.position.set(30, 60, 50);
            scene.add(pointLight);
            
            const bottomLight = new THREE.PointLight(CONFIG.colors.red, 1.5, 200);
            bottomLight.position.set(-20, -60, 40);
            scene.add(bottomLight);

            const topLight = new THREE.DirectionalLight(0xffffff, 1.2);
            topLight.position.set(0, 100, 20);
            scene.add(topLight);

            // --- 后处理 (Bloom) ---
            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight), 
                1.5, 0.4, 0.85
            );
            bloomPass.threshold = 0.18; // 稍微提高一点阈值，保证照片的暗部不会泛光
            bloomPass.strength = 1.6;   // 保持强辉光
            bloomPass.radius = 0.5;

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            createObjects();

            window.addEventListener('resize', onWindowResize, false);
        }

        function createObjects() {
            objects.forEach(obj => scene.remove(obj.mesh));
            objects = [];

            // --- 粒子材质 (高亮发光) ---
            
            const matGold = new THREE.MeshStandardMaterial({ 
                color: 0xFFD700, 
                emissive: 0x554400,
                emissiveIntensity: 0.6,
                metalness: 0.7, 
                roughness: 0.1 
            });

            const matGreen = new THREE.MeshStandardMaterial({ 
                color: 0x558855,
                emissive: 0x052205,
                emissiveIntensity: 0.3,
                roughness: 0.3, 
                flatShading: true 
            });

            const matRed = new THREE.MeshStandardMaterial({ 
                color: 0xFF0000, 
                emissive: 0x440000,
                emissiveIntensity: 0.5,
                metalness: 0.4, 
                roughness: 0.2 
            });

            const geoSphere = new THREE.SphereGeometry(1, 32, 32);
            const geoBox = new THREE.BoxGeometry(1.6, 1.6, 1.6);
            const geoCylinder = new THREE.CylinderGeometry(0.3, 0.3, 3.5, 16);

            const total = CONFIG.particleCount;
            
            for (let i = 0; i < total; i++) {
                let mesh, type;
                const rand = Math.random();

                if (rand < 0.5) {
                    mesh = new THREE.Mesh(geoSphere, matGreen);
                    type = 'leaf';
                } else if (rand < 0.7) {
                    mesh = new THREE.Mesh(geoSphere, matGold);
                    mesh.scale.setScalar(1.5); 
                    type = 'ornament';
                } else if (rand < 0.85) {
                    mesh = new THREE.Mesh(geoBox, matRed);
                    type = 'gift';
                } else {
                    mesh = new THREE.Mesh(geoCylinder, matRed);
                    type = 'candy';
                }

                // 树形位置
                const p = i / total;
                const y = CONFIG.treeHeight * 0.5 - CONFIG.treeHeight * p;
                const radius = CONFIG.baseRadius * p * (1 + 0.2 * Math.random());
                const angle = i * 1.618 * 5; 
                
                const treePos = new THREE.Vector3(
                    Math.cos(angle) * radius,
                    y,
                    Math.sin(angle) * radius
                );
                treePos.x += (Math.random() - 0.5) * 3;
                treePos.z += (Math.random() - 0.5) * 3;

                // 散开位置
                const phi = Math.acos(-1 + (2 * i) / total);
                const theta = Math.sqrt(total * Math.PI) * phi;
                const scatterPos = new THREE.Vector3(
                    CONFIG.spreadRadius * Math.cos(theta) * Math.sin(phi),
                    CONFIG.spreadRadius * Math.sin(theta) * Math.sin(phi),
                    CONFIG.spreadRadius * Math.cos(phi)
                );

                mesh.position.copy(treePos);
                mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);

                scene.add(mesh);

                objects.push({
                    mesh: mesh,
                    treePos: treePos,
                    scatterPos: scatterPos,
                    type: type,
                    baseScale: mesh.scale.clone(),
                    isPhoto: false
                });
            }

            rebuildPhotos();
        }

        function rebuildPhotos() {
            // 清理旧照片
            for (let i = objects.length - 1; i >= 0; i--) {
                if (objects[i].isPhoto) {
                    scene.remove(objects[i].mesh);
                    objects.splice(i, 1);
                }
            }

            if (photoTextures.length === 0) return;

            // 边框材质
            const frameMat = new THREE.MeshStandardMaterial({ 
                color: 0xFFD700, 
                metalness: 0.9, 
                roughness: 0.1,
                emissive: 0x664400,
                emissiveIntensity: 0.6
            });

            photoTextures.forEach((tex, index) => {
                const aspect = tex.image.height / tex.image.width;
                const geometry = new THREE.PlaneGeometry(8, 8 * aspect);
                
                // --- 核心修复：照片材质亮化处理 ---
                // 使用 Standard 材质，并把照片纹理同时也赋给 emissiveMap (自发光贴图)
                // 这样照片就像一个灯箱一样自己发光，不依赖外部光照，清晰明亮
                const material = new THREE.MeshStandardMaterial({ 
                    map: tex,
                    side: THREE.DoubleSide,
                    emissive: 0xffffff,       // 发光基色：白
                    emissiveMap: tex,         // 发光纹理：照片本身
                    emissiveIntensity: 0.8,   // 发光强度：适中，0.8左右既亮又不会过曝
                    roughness: 0.4,
                    metalness: 0.1
                });
                
                const frameGeo = new THREE.BoxGeometry(8.4, 8.4 * aspect, 0.3);
                const frameMesh = new THREE.Mesh(frameGeo, frameMat);
                frameMesh.position.z = -0.16; // 边框在后
                
                const mesh = new THREE.Mesh(geometry, material);
                mesh.add(frameMesh);

                // 计算位置
                const p = 0.15 + (index / photoTextures.length) * 0.7; 
                const y = CONFIG.treeHeight * 0.5 - CONFIG.treeHeight * p;
                const radius = CONFIG.baseRadius * p + 8; 
                const angle = index * (Math.PI * 2 / photoTextures.length) + 1;

                const treePos = new THREE.Vector3(
                    Math.cos(angle) * radius,
                    y,
                    Math.sin(angle) * radius
                );
                
                const scatterPos = new THREE.Vector3(
                    (Math.random() - 0.5) * CONFIG.spreadRadius * 1.4,
                    (Math.random() - 0.5) * CONFIG.spreadRadius * 1.4,
                    (Math.random() - 0.5) * 60
                );

                mesh.position.copy(treePos);
                mesh.lookAt(0, y, 0);

                scene.add(mesh);
                objects.push({
                    mesh: mesh,
                    treePos: treePos,
                    scatterPos: scatterPos,
                    type: 'photo',
                    baseScale: new THREE.Vector3(1, 1, 1),
                    isPhoto: true
                });
            });
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
            const files = e.target.files;
            if (!files.length) return;

            let loadedCount = 0;
            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function() {
                        const tex = new THREE.Texture(img);
                        // --- 核心修复：色彩空间 ---
                        // 必须告诉 Three.js 这是一个 sRGB 纹理，否则会被压暗
                        tex.encoding = THREE.sRGBEncoding;
                        tex.needsUpdate = true;
                        
                        photoTextures.push(tex);
                        loadedCount++;
                        if (loadedCount === files.length) {
                            rebuildPhotos();
                        }
                    }
                }
                reader.readAsDataURL(files[i]);
            }
        });

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // 交互旋转逻辑
            if (currentState === STATE.OPEN) {
                currentRotation.x += (targetRotation.x - currentRotation.x) * CONFIG.camSmooth;
                currentRotation.y += (targetRotation.y - currentRotation.y) * CONFIG.camSmooth;
                scene.rotation.y = currentRotation.x * 2.5;
                scene.rotation.x = currentRotation.y * 0.8;
            } else if (currentState === STATE.CLOSED) {
                scene.rotation.y += 0.003;
                scene.rotation.x *= 0.95; 
            }

            objects.forEach(obj => {
                let targetPos;
                
                if (currentState === STATE.CLOSED) {
                    targetPos = obj.treePos;
                    if(obj.isPhoto) {
                        obj.mesh.lookAt(0, obj.treePos.y, 0);
                        obj.mesh.rotation.y += Math.PI; 
                    }
                } else {
                    targetPos = obj.scatterPos;
                    if(!obj.isPhoto) {
                        obj.mesh.rotation.x += 0.015;
                        obj.mesh.rotation.y += 0.015;
                    }
                }

                // 移动插值
                obj.mesh.position.lerp(targetPos, 0.04);

                // ZOOM 状态处理
                if (currentState === STATE.ZOOM && obj === focusedPhoto) {
                    // 飞到屏幕正前方
                    const zoomScale = 4.5;
                    obj.mesh.scale.lerp(new THREE.Vector3(zoomScale, zoomScale, zoomScale), 0.08);
                    
                    // 始终朝向相机
                    obj.mesh.lookAt(camera.position);
                    
                    // 将被选中的照片拉向相机，忽略场景旋转
                    // 方法：获取相机前方的一个点，转换到世界坐标，但这样很复杂因为Scene在转
                    // 简化方法：因为我们是单场景，直接让它停在 scatterPos 但是位置靠近 (0,0,30)
                    // 为了简单有效，我们让它直接去 (0,0,40) 并通过 lookAt 修正
                    // 注意：这在 scene 旋转时会有偏移，但在散开态 scene 旋转受控
                    
                    // 这里不做复杂的世界坐标逆变换，而是简单放大
                    // 如果手在动，照片会跟着场景转，这很酷
                } else {
                    obj.mesh.scale.lerp(obj.baseScale, 0.1);
                }
            });

            composer.render();
        }

        // --- MediaPipe 手势逻辑 ---
        const videoElement = document.getElementById('video-input');
        const statusText = document.getElementById('status-text');

        function onResults(results) {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                processGestures(landmarks);
            }
        }

        function processGestures(landmarks) {
            const thumbOpen = landmarks[4].x < landmarks[3].x;
            const tips = [8, 12, 16, 20];
            const pips = [6, 10, 14, 18];
            let extendedCount = 0;
            if(thumbOpen) extendedCount++;
            for(let i=0; i<4; i++) {
                if (landmarks[tips[i]].y < landmarks[pips[i]].y) extendedCount++;
            }

            // 握拳 -> 树
            if (extendedCount <= 1) {
                currentState = STATE.CLOSED;
                statusText.innerText = "🎄 Mode: CHRISTMAS TREE";
                focusedPhoto = null;
            }
            // 张手 -> 散开
            else if (extendedCount >= 4) {
                currentState = STATE.OPEN;
                statusText.innerText = "✨ Mode: GALAXY SCATTER";
                focusedPhoto = null;

                const x = landmarks[9].x - 0.5;
                const y = landmarks[9].y - 0.5; 
                targetRotation.x = x * 3.5; 
                targetRotation.y = y * 3.5;
            }
            // 捏合 -> 放大
            else {
                const dx = landmarks[8].x - landmarks[4].x;
                const dy = landmarks[8].y - landmarks[4].y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < 0.05) {
                    statusText.innerText = "🔍 Mode: MEMORY FOCUS";
                    if (currentState === STATE.OPEN && !focusedPhoto) {
                        const photos = objects.filter(o => o.isPhoto);
                        if (photos.length > 0) {
                            focusedPhoto = photos[Math.floor(Math.random() * photos.length)];
                            currentState = STATE.ZOOM;
                        }
                    }
                }
            }
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });
        
        hands.onResults(onResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 320,
            height: 240
        });
        
        cameraUtils.start();
        initThree();
        animate();

    </script>
</body>
</html>
